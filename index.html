<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reabrir actividad</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* =========================
   GENERAL
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:#eef2f6;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
  color:#1e293b;
}

/* =========================
   CARD
========================= */

.card{
  width:100%;
  max-width:460px;
  background:#f8f8f9;
  border-radius:30px;
  padding:35px;
  box-shadow:0 10px 30px rgba(15,23,42,0.06);
  border:1px solid #e5e7eb;
}

/* =========================
   TITULOS
========================= */

h2{
  font-size:34px;
  font-weight:800;
  color:#243247;
  margin-bottom:10px;
}

.subtitulo{
  color:#64748b;
  font-size:15px;
  margin-bottom:25px;
  line-height:1.5;
}

/* =========================
   ESTADO
========================= */

#estado{
  background:white;
  border:1px solid #edf1f5;
  border-radius:24px;
  padding:24px;
  margin-bottom:22px;
  font-size:15px;
  color:#334155;
  line-height:1.8;
}

#estado b{
  color:#243247;
}

/* =========================
   BOTONES
========================= */

button{
  width:100%;
  border:none;
  padding:14px;
  border-radius:16px;
  cursor:pointer;
  font-size:15px;
  font-weight:700;
  transition:0.2s;
  margin-top:12px;
}

button:hover{
  opacity:0.92;
}

.aprobar{
  background:#243247;
  color:white;
}

.rechazar{
  background:#e2e8f0;
  color:#243247;
}

.whatsapp{
  background:#f1f5f9;
  color:#334155;
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:600px){

  .card{
    padding:25px;
    border-radius:24px;
  }

  h2{
    font-size:28px;
  }

}

</style>
</head>

<body>

<div class="card">

  <h2>
    Reapertura de actividad
  </h2>

  <p class="subtitulo">
    Gestión y autorización de solicitudes de reapertura
  </p>

  <div id="estado">
    Verificando actividad...
  </div>

  <button
    class="aprobar"
    onclick="aprobar()">

    Aprobar reapertura

  </button>

  <button
    class="rechazar"
    onclick="rechazar()">

    No autorizar reapertura

  </button>

  <button
    id="btnWhatsapp"
    class="whatsapp"
    style="display:none"
    onclick="enviarWhatsapp()">

    Enviar mensaje por WhatsApp

  </button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
  getFirestore,
  doc,
  updateDoc,
  getDoc
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";


/* =========================
   FIREBASE
========================= */

const app = initializeApp({

  apiKey:"TU_API_KEY",

  authDomain:"agrotecdb.firebaseapp.com",

  projectId:"agrotecdb"

});

const db =
getFirestore(app);


/* =========================
   PARAMETROS
========================= */

const params =
new URLSearchParams(
  window.location.search
);

const actId =
params.get("actId");

let actividad = null;

let estadoWhatsapp = "";


/* =========================
   VERIFICAR ACTIVIDAD
========================= */

async function verificar(){

  if(!actId){

    document
    .getElementById("estado")
    .innerHTML =

    "Actividad inválida";

    return;

  }

  try{

    const snap =
    await getDoc(
      doc(db,"actividades",actId)
    );

    if(!snap.exists()){

      document
      .getElementById("estado")
      .innerHTML =

      "Actividad no encontrada";

      return;

    }

    actividad = snap.data();

    document
    .getElementById("estado")
    .innerHTML =

    `

    <b>Actividad:</b>
    ${actividad.nombre}

    <br><br>

    <b>Trabajador:</b>
    ${actividad.trabajador}

    <br><br>

    <b>Zona:</b>
    ${actividad.zona}

    <br><br>

    <b>Progreso actual:</b>
    ${actividad.progreso || 0}%

    `;

  }

  catch(error){

    console.error(error);

    document
    .getElementById("estado")
    .innerHTML =

    "Error verificando actividad";

  }

}

verificar();


/* =========================
   APROBAR
========================= */

window.aprobar = async()=>{

  try{

    await updateDoc(

      doc(db,"actividades",actId),

      {

        estado:"en_proceso",

        iniciada:true,

        fechaFin:""

      }

    );

    document
    .getElementById("estado")
    .innerHTML =

    `

    <b>Actividad reabierta correctamente.</b>

    <br><br>

    El trabajador continuará desde el
    progreso anterior.

    <br><br>

    <b>Progreso actual:</b>

    ${actividad.progreso || 0}%

    `;

    estadoWhatsapp = "aprobada";

    document
    .getElementById("btnWhatsapp")
    .style.display = "block";

  }

  catch(error){

    console.error(error);

    document
    .getElementById("estado")
    .innerHTML =

    "Error al reabrir actividad";

  }

};


/* =========================
   RECHAZAR
========================= */

window.rechazar = async()=>{

  document
  .getElementById("estado")
  .innerHTML =

  `

  <b>Solicitud rechazada.</b>

  <br><br>

  La reapertura de la actividad
  no fue autorizada.

  `;

  estadoWhatsapp = "rechazada";

  document
  .getElementById("btnWhatsapp")
  .style.display = "block";

};


/* =========================
   WHATSAPP
========================= */

window.enviarWhatsapp = async()=>{

  try{

    const usuarioSnap =
    await getDoc(

      doc(
        db,
        "usuarios",
        actividad.usuarioId
      )

    );

    if(!usuarioSnap.exists()){

      alert(
        "Usuario no encontrado"
      );

      return;

    }

    const usuario =
    usuarioSnap.data();

    const telefono =
    (usuario.telefono || "")
    .replace(/\s+/g,"")
    .replace("+52","");

    if(!telefono){

      alert(
        "El usuario no tiene teléfono registrado"
      );

      return;

    }

    let mensaje = "";

    if(
      estadoWhatsapp === "aprobada"
    ){

      mensaje =

`Hola ${actividad.trabajador},

Tu solicitud de reapertura fue APROBADA.

Actividad:
${actividad.nombre}

Zona:
${actividad.zona}

La actividad continuará desde el progreso anterior:

${actividad.progreso || 0}%`;

    }

    if(
      estadoWhatsapp === "rechazada"
    ){

      mensaje =

`Hola ${actividad.trabajador},

Tu solicitud de reapertura NO fue autorizada.

Actividad:
${actividad.nombre}

Zona:
${actividad.zona}`;

    }

    const url =

    `https://wa.me/52${telefono}?text=${encodeURIComponent(mensaje)}`;

    window.open(url,"_blank");

  }

  catch(error){

    console.error(error);

    alert(
      "Error enviando WhatsApp"
    );

  }

};

</script>

</body>
</html>
