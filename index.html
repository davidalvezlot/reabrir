<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reabrir actividad</title>

<style>

body{
  font-family:Arial;
  background:#f4f6f9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:white;
  padding:30px;
  border-radius:15px;
  width:380px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
  margin-top:0;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top:15px;
  font-size:15px;
}

.aprobar{
  background:#2ecc71;
}

.aprobar:hover{
  background:#27ae60;
}

.rechazar{
  background:#e74c3c;
}

.rechazar:hover{
  background:#c0392b;
}

.whatsapp{
  background:#25D366;
}

.whatsapp:hover{
  background:#1ebc59;
}

#estado{
  margin-top:15px;
  background:#f7f7f7;
  padding:12px;
  border-radius:10px;
}

</style>
</head>

<body>

<div class="card">

  <h2>
    Reapertura de actividad
  </h2>

  <div id="estado">
    Verificando actividad...
  </div>

  <button
    class="aprobar"
    onclick="aprobar()">

    Aprobar reapertura

  </button>

  <button
    class="rechazar"
    onclick="rechazar()">

    No autorizar reapertura

  </button>

  <button
    id="btnWhatsapp"
    class="whatsapp"
    style="display:none"
    onclick="enviarWhatsapp()">

    Enviar mensaje por WhatsApp

  </button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
  getFirestore,
  doc,
  updateDoc,
  getDoc
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";


// FIREBASE
const app = initializeApp({

  apiKey:"TU_API_KEY",

  authDomain:"agrotecdb.firebaseapp.com",

  projectId:"agrotecdb"

});

const db =
getFirestore(app);


// PARAMETROS
const params =
new URLSearchParams(
  window.location.search
);

const actId =
params.get("actId");

let actividad = null;

let estadoWhatsapp = "";


// VERIFICAR ACTIVIDAD
async function verificar(){

  if(!actId){

    document
    .getElementById("estado")
    .innerHTML =

    "Actividad inválida";

    return;

  }

  try{

    const snap =
    await getDoc(
      doc(db,"actividades",actId)
    );

    if(!snap.exists()){

      document
      .getElementById("estado")
      .innerHTML =

      "Actividad no encontrada";

      return;

    }

    actividad = snap.data();

    document
    .getElementById("estado")
    .innerHTML =

    `

    <b>Actividad:</b>
    ${actividad.nombre}

    <br><br>

    <b>Trabajador:</b>
    ${actividad.trabajador}

    <br><br>

    <b>Zona:</b>
    ${actividad.zona}

    <br><br>

    <b>Progreso actual:</b>
    ${actividad.progreso || 0}%

    `;

  }

  catch(error){

    console.error(error);

    document
    .getElementById("estado")
    .innerHTML =

    "Error verificando actividad";

  }

}

verificar();


// APROBAR
window.aprobar = async()=>{

  try{

    // REABRIR DESDE EL MISMO PROGRESO
    await updateDoc(

      doc(db,"actividades",actId),

      {

        estado:"en_proceso",

        iniciada:true,

        fechaFin:""

      }

    );

    document
    .getElementById("estado")
    .innerHTML =

    `

    Actividad reabierta correctamente.

    <br><br>

    El trabajador continuará desde el
    progreso anterior:

    <br><br>

    <b>${actividad.progreso || 0}%</b>

    `;

    estadoWhatsapp = "aprobada";

    document
    .getElementById("btnWhatsapp")
    .style.display = "block";

  }

  catch(error){

    console.error(error);

    document
    .getElementById("estado")
    .innerHTML =

    "Error al reabrir actividad";

  }

};


// RECHAZAR
window.rechazar = async()=>{

  document
  .getElementById("estado")
  .innerHTML =

  "La reapertura NO fue autorizada.";

  estadoWhatsapp = "rechazada";

  document
  .getElementById("btnWhatsapp")
  .style.display = "block";

};


// WHATSAPP
window.enviarWhatsapp = async()=>{

  try{

    const usuarioSnap =
    await getDoc(

      doc(
        db,
        "usuarios",
        actividad.usuarioId
      )

    );

    if(!usuarioSnap.exists()){

      alert(
        "Usuario no encontrado"
      );

      return;

    }

    const usuario =
    usuarioSnap.data();

    const telefono =
    usuario.telefono || "";

    if(!telefono){

      alert(
        "El usuario no tiene teléfono registrado"
      );

      return;

    }

    let mensaje = "";

    // APROBADA
    if(
      estadoWhatsapp === "aprobada"
    ){

      mensaje =

`Hola ${actividad.trabajador},

Tu solicitud de reapertura fue APROBADA.

Actividad:
${actividad.nombre}

Zona:
${actividad.zona}

Tu actividad continuará desde el progreso anterior:

${actividad.progreso || 0}%`;

    }

    // RECHAZADA
    if(
      estadoWhatsapp === "rechazada"
    ){

      mensaje =

`Hola ${actividad.trabajador},

Tu solicitud de reapertura NO fue autorizada.

Actividad:
${actividad.nombre}

Zona:
${actividad.zona}`;

    }

    const url =

    `https://wa.me/52${telefono}?text=${encodeURIComponent(mensaje)}`;

    window.open(url,"_blank");

  }

  catch(error){

    console.error(error);

    alert(
      "Error enviando WhatsApp"
    );

  }

};

</script>

</body>
</html>
