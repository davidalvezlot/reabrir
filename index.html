<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reabrir actividad</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* =========================
   GENERAL
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:#eef2f6;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
  color:#1e293b;
}

/* =========================
   CARD
========================= */

.card{
  width:100%;
  max-width:460px;
  background:#f8f8f9;
  border-radius:30px;
  padding:35px;
  box-shadow:0 10px 30px rgba(15,23,42,0.06);
  border:1px solid #e5e7eb;
}

/* =========================
   TITULOS
========================= */

h2{
  font-size:34px;
  font-weight:800;
  color:#243247;
  margin-bottom:10px;
}

.subtitulo{
  color:#64748b;
  font-size:15px;
  margin-bottom:25px;
  line-height:1.5;
}

/* =========================
   ESTADO
========================= */

#estado{
  background:white;
  border:1px solid #edf1f5;
  border-radius:24px;
  padding:24px;
  margin-bottom:22px;
  font-size:15px;
  color:#334155;
  line-height:1.8;
}

#estado b{
  color:#243247;
}

/* =========================
   BOTONES
========================= */

button{
  width:100%;
  border:none;
  padding:14px;
  border-radius:16px;
  cursor:pointer;
  font-size:15px;
  font-weight:700;
  transition:0.2s;
  margin-top:12px;
}

button:hover{
  opacity:0.92;
}

.reabrir{
  background:#243247;
  color:white;
}

.finalizar{
  background:#2563eb;
  color:white;
}

.rechazar{
  background:#e2e8f0;
  color:#243247;
}

.whatsapp{
  background:#f1f5f9;
  color:#334155;
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:600px){

  .card{
    padding:25px;
    border-radius:24px;
  }

  h2{
    font-size:28px;
  }

}

</style>
</head>

<body>

<div class="card">

  <h2>
    Reapertura de actividad
  </h2>

  <p class="subtitulo">
    Gestión y autorización de solicitudes de reapertura
  </p>

  <div id="estado">
    Verificando actividad...
  </div>

  <!-- REABRIR -->

  <button
    class="reabrir"
    onclick="reabrirActividad()">

    Reabrir desde último avance

  </button>

  <!-- FINALIZAR -->

  <button
    class="finalizar"
    onclick="finalizarActividad()">

    Finalizar actividad al 100%

  </button>

  <!-- RECHAZAR -->

  <button
    class="rechazar"
    onclick="rechazar()">

    No autorizar reapertura

  </button>

  <!-- WHATSAPP -->

  <button
    id="btnWhatsapp"
    class="whatsapp"
    style="display:none"
    onclick="enviarWhatsapp()">

    Enviar mensaje por WhatsApp

  </button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {

  getFirestore,
  doc,
  updateDoc,
  getDoc

}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* =========================
   FIREBASE
========================= */

const app = initializeApp({

  apiKey:"TU_API_KEY",

  authDomain:"agrotecdb.firebaseapp.com",

  projectId:"agrotecdb"

});

const db =
getFirestore(app);

/* =========================
   PARAMETROS
========================= */

const params =
new URLSearchParams(
  window.location.search
);

const actId =
params.get("actId");

let actividad = null;

let estadoWhatsapp = "";

/* =========================
   VERIFICAR ACTIVIDAD
========================= */

async function verificar(){

  if(!actId){

    document
    .getElementById("estado")
    .innerHTML =

    "Actividad inválida";

    return;

  }

  try{

    const snap =
    await getDoc(
      doc(db,"actividades",actId)
    );

    if(!snap.exists()){

      document
      .getElementById("estado")
      .innerHTML =

      "Actividad no encontrada";

      return;

    }

    actividad = snap.data();

    document
    .getElementById("estado")
    .innerHTML =

    `

    <b>Actividad:</b>
    ${actividad.nombre}

    <br><br>

    <b>Trabajador:</b>
    ${actividad.trabajador}

    <br><br>

    <b>Zona:</b>
    ${actividad.zona}

    <br><br>

    <b>Duración:</b>
    ${actividad.duracionHoras || 2} horas

    <br><br>

    <b>Progreso actual:</b>
    ${actividad.progreso || 0}%

    `;

  }

  catch(error){

    console.error(error);

    document
    .getElementById("estado")
    .innerHTML =

    "Error verificando actividad";

  }

}

verificar();

/* =========================
   REABRIR ACTIVIDAD
========================= */

window.reabrirActividad = async()=>{

  try{

    await updateDoc(

      doc(db,"actividades",actId),

      {

        estado:"en_proceso",

        iniciada:true,

        completada:false,

        fechaFin:""

      }

    );

    document
    .getElementById("estado")
    .innerHTML =

    `

    <b>Actividad reabierta correctamente.</b>

    <br><br>

    La actividad continuará desde
    el último progreso guardado.

    <br><br>

    <b>Progreso actual:</b>

    ${actividad.progreso || 0}%

    `;

    estadoWhatsapp = "reabierta";

    document
    .getElementById("btnWhatsapp")
    .style.display = "block";

  }

  catch(error){

    console.error(error);

    document
    .getElementById("estado")
    .innerHTML =

    "Error al reabrir actividad";

  }

};

/* =========================
   FINALIZAR ACTIVIDAD
========================= */

window.finalizarActividad = async()=>{

  try{

    /* HORAS ACTIVIDAD */

    const horasActividad =
    Number(
      actividad.duracionHoras || 2
    );

    /* ACTIVIDAD */

    await updateDoc(

      doc(db,"actividades",actId),

      {

        estado:"finalizada",

        iniciada:false,

        completada:true,

        progreso:100,

        progresoActual:100,

        fechaFin:
        new Date().toISOString(),

        horasReales:
        horasActividad

      }

    );

    /* ACTUALIZAR USUARIO */

    if(actividad.usuarioId){

      const usuarioRef =
      doc(
        db,
        "usuarios",
        actividad.usuarioId
      );

      const usuarioSnap =
      await getDoc(usuarioRef);

      if(usuarioSnap.exists()){

        const usuario =
        usuarioSnap.data();

        const horasActuales =
        Number(
          usuario.horasHoy || 0
        );

        const actividadesActuales =
        Number(
          usuario.actividadesHoy || 0
        );

        const nuevasHoras =

          horasActuales +
          horasActividad;

        await updateDoc(

          usuarioRef,

          {

            horasHoy:
            nuevasHoras,

            actividadesHoy:
            actividadesActuales + 1,

            progresoActual:100,

            ultimoProgreso:100,

            estadoActividad:
            "Finalizada",

            actividadActual:
            actividad.nombre

          }

        );

      }

    }

    /* LIBERAR RECURSO */

    if(actividad.recursoId){

      await updateDoc(

        doc(
          db,
          "recursos",
          actividad.recursoId
        ),

        {

          estado:"disponible",

          asignadoA:"",

          nombreAsignado:"",

          rolAsignado:""

        }

      );

    }

    actividad.progreso = 100;

    document
    .getElementById("estado")
    .innerHTML =

    `

    <b>Actividad finalizada correctamente.</b>

    <br><br>

    Las horas de la actividad
    fueron agregadas automáticamente
    al trabajador.

    <br><br>

    <b>Horas agregadas:</b>

    ${horasActividad} horas

    <br><br>

    <b>Progreso final:</b>

    100%

    `;

    estadoWhatsapp = "finalizada";

    document
    .getElementById("btnWhatsapp")
    .style.display = "block";

  }

  catch(error){

    console.error(error);

    document
    .getElementById("estado")
    .innerHTML =

    "Error al finalizar actividad";

  }

};

/* =========================
   RECHAZAR
========================= */

window.rechazar = async()=>{

  document
  .getElementById("estado")
  .innerHTML =

  `

  <b>Solicitud rechazada.</b>

  <br><br>

  La reapertura de la actividad
  no fue autorizada.

  `;

  estadoWhatsapp = "rechazada";

  document
  .getElementById("btnWhatsapp")
  .style.display = "block";

};

/* =========================
   WHATSAPP
========================= */

window.enviarWhatsapp = async()=>{

  try{

    const usuarioSnap =
    await getDoc(

      doc(
        db,
        "usuarios",
        actividad.usuarioId
      )

    );

    if(!usuarioSnap.exists()){

      alert(
        "Usuario no encontrado"
      );

      return;

    }

    const usuario =
    usuarioSnap.data();

    const telefono =
    (usuario.telefono || "")
    .replace(/\s+/g,"")
    .replace("+52","");

    if(!telefono){

      alert(
        "El usuario no tiene teléfono registrado"
      );

      return;

    }

    let mensaje = "";

    /* REABIERTA */

    if(
      estadoWhatsapp === "reabierta"
    ){

      mensaje =

`Hola ${actividad.trabajador},

Tu actividad fue REABIERTA.

Actividad:
${actividad.nombre}

Zona:
${actividad.zona}

La actividad continuará desde el último avance registrado:

${actividad.progreso || 0}%`;

    }

    /* FINALIZADA */

    if(
      estadoWhatsapp === "finalizada"
    ){

      mensaje =

`Hola ${actividad.trabajador},

Tu actividad fue FINALIZADA correctamente.

Actividad:
${actividad.nombre}

Zona:
${actividad.zona}

Horas agregadas:
${actividad.duracionHoras || 2}

Progreso final:
100%`;

    }

    /* RECHAZADA */

    if(
      estadoWhatsapp === "rechazada"
    ){

      mensaje =

`Hola ${actividad.trabajador},

Tu solicitud de reapertura NO fue autorizada.

Actividad:
${actividad.nombre}

Zona:
${actividad.zona}`;

    }

    const url =

    `https://wa.me/52${telefono}?text=${encodeURIComponent(mensaje)}`;

    window.open(url,"_blank");

  }

  catch(error){

    console.error(error);

    alert(
      "Error enviando WhatsApp"
    );

  }

};

</script>

</body>
</html>
