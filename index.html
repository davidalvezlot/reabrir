<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reabrir actividad</title>

<style>

body{
  font-family:Arial;
  background:#f4f6f9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:white;
  padding:30px;
  border-radius:15px;
  width:380px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
  margin-top:0;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top:15px;
  font-size:15px;
}

.aprobar{
  background:#2ecc71;
}

.aprobar:hover{
  background:#27ae60;
}

.rechazar{
  background:#e74c3c;
}

.rechazar:hover{
  background:#c0392b;
}

#estado{
  margin-top:15px;
  background:#f7f7f7;
  padding:12px;
  border-radius:10px;
}

</style>
</head>

<body>

<div class="card">

  <h2>
    Reapertura de actividad
  </h2>

  <div id="estado">
    Verificando actividad...
  </div>

  <button
    class="aprobar"
    onclick="aprobar()">

    Aprobar reapertura

  </button>

  <button
    class="rechazar"
    onclick="rechazar()">

    No autorizar reapertura

  </button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
  getFirestore,
  doc,
  updateDoc,
  getDoc
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";


// FIREBASE
const app = initializeApp({

  apiKey:"TU_API_KEY",

  authDomain:"agrotecdb.firebaseapp.com",

  projectId:"agrotecdb"

});

const db =
getFirestore(app);


// PARAMETROS
const params =
new URLSearchParams(
  window.location.search
);

const actId =
params.get("actId");

let actividad = null;


// VERIFICAR ACTIVIDAD
async function verificar(){

  if(!actId){

    document
    .getElementById("estado")
    .innerHTML =

    "Actividad inválida";

    return;

  }

  try{

    const snap =
    await getDoc(
      doc(db,"actividades",actId)
    );

    if(!snap.exists()){

      document
      .getElementById("estado")
      .innerHTML =

      "Actividad no encontrada";

      return;

    }

    actividad = snap.data();

    document
    .getElementById("estado")
    .innerHTML =

    `

    <b>Actividad:</b>
    ${actividad.nombre}
    <br><br>

    <b>Trabajador:</b>
    ${actividad.trabajador}
    <br><br>

    <b>Zona:</b>
    ${actividad.zona}

    `;

  }

  catch(error){

    console.error(error);

    document
    .getElementById("estado")
    .innerHTML =

    "Error verificando actividad";

  }

}

verificar();


// APROBAR
window.aprobar = async()=>{

  try{

    // REABRIR ACTIVIDAD
    await updateDoc(

      doc(db,"actividades",actId),

      {

        estado:"disponible",

        iniciada:false,

        progreso:0,

        tiempoTranscurrido:0,

        fechaInicio:"",

        fechaFin:""

      }

    );

    document
    .getElementById("estado")
    .innerHTML =

    "Actividad reabierta correctamente.<br><br>El trabajador ya puede volver a iniciar la tarea.";


    // WHATSAPP
    // TELEFONO DEL TRABAJADOR
    // DEBE VENIR EN FIREBASE
    const telefono =
    actividad.telefono || "";

    if(telefono){

      const mensaje =

      `Hola ${actividad.trabajador},

La actividad "${actividad.nombre}" fue reabierta y ya puedes volver a iniciarla.

Zona: ${actividad.zona}`;

      const url =

      `https://wa.me/52${telefono}?text=${encodeURIComponent(mensaje)}`;

      // ABRIR WHATSAPP
      window.open(url,"_blank");

    }

  }

  catch(error){

    console.error(error);

    document
    .getElementById("estado")
    .innerHTML =

    "Error al reabrir actividad";

  }

};


// RECHAZAR
window.rechazar = async()=>{

  try{

    document
    .getElementById("estado")
    .innerHTML =

    "La reapertura NO fue autorizada.";

  }

  catch(error){

    console.error(error);

  }

};

</script>

</body>
</html>
