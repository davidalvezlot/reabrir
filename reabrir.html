<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reabrir actividad</title>

<style>
body{
  font-family:Arial;
  background:#f4f6f9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:white;
  padding:30px;
  border-radius:15px;
  width:350px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2ecc71;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top:15px;
}

button:hover{
  background:#27ae60;
}
</style>
</head>

<body>

<div class="card">

  <h2>Reapertura de actividad</h2>

  <p id="estado">
    Verificando actividad...
  </p>

  <button onclick="aprobar()">
    Aprobar reapertura
  </button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
  getFirestore,
  doc,
  updateDoc
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";


// FIREBASE
const app = initializeApp({

  apiKey: "TU_API_KEY",
  authDomain: "agrotecdb.firebaseapp.com",
  projectId: "agrotecdb"

});

const db = getFirestore(app);


// PARAMS
const params =
  new URLSearchParams(window.location.search);

const actId =
  params.get("actId");


// APROBAR
window.aprobar = async () => {

  try {

    await updateDoc(

      doc(db, "actividades", actId),

      {

        estado: "en_proceso",

        fechaFin: "",

        iniciada: true

      }

    );

    document.getElementById("estado")
    .innerHTML =
      "Actividad reabierta correctamente";

  }

  catch(error){

    console.error(error);

    document.getElementById("estado")
    .innerHTML =
      "Error al reabrir actividad";

  }

};

</script>

</body>
</html>
